name: Deploy MkDocs site to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Upgraded v3 -> v4

      - name: Set up Python
        uses: actions/setup-python@v5  # Upgraded v4 -> v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material

      - name: Build MkDocs site
        run: |
          mkdocs build

      - name: Setup Pages
        uses: actions/configure-pages@v5  # Upgraded v3 -> v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3  # Upgraded v1 -> v3 (Fixes the error!)
        with:
          path: ./site

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4  # Upgraded v2 -> v4